<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Heysync · 音频工程师单词卡 | 会员词库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f7;
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            padding: 1.2rem;
            min-height: 100vh;
        }

        .app-wrapper {
            max-width: 880px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 0.5rem 0;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1c1c1e, #3a3a3e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        /* Logo 图片样式 - 您只需替换图片链接 */
        .logo-img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 12px;
        }
        .header p {
            color: #6c6c70;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .toolbar {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(20px);
            border-radius: 1.8rem;
            padding: 0.7rem 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 0.5px solid rgba(255,255,255,0.5);
        }
        .search-box {
            flex: 2;
            min-width: 160px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.4rem;
            border-radius: 2.5rem;
            border: 0.5px solid #d9d9df;
            background: #ffffff;
            font-size: 0.9rem;
            outline: none;
        }
        .search-box input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.7;
        }
        .stats-badge {
            background: #e9e9ef;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1c1c1e;
        }
        .btn-icon {
            background: #ffffff;
            border: 0.5px solid #d9d9df;
            color: #007aff;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-icon:hover {
            background: #f2f2f6;
            transform: scale(0.97);
        }

        .flashcard {
            background: #ffffff;
            border-radius: 2.2rem;
            padding: 2rem 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            border: 0.5px solid rgba(0,0,0,0.03);
        }
        .word-en {
            font-size: 3rem;
            font-weight: 620;
            color: #1c1c1e;
            text-align: center;
            letter-spacing: -0.01em;
            word-break: break-word;
            margin-bottom: 0.5rem;
        }
        .pronounce-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        .speak-btn {
            background: #f2f2f6;
            border: none;
            padding: 0.45rem 1.6rem;
            border-radius: 2.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s;
            color: #007aff;
        }
        .speak-btn:active {
            transform: scale(0.96);
            background: #e5e5ea;
        }
        .meaning-card {
            background: #f9f9fb;
            padding: 1.2rem;
            border-radius: 1.6rem;
            border-left: 4px solid #007aff;
        }
        .meaning-cn {
            font-size: 1.5rem;
            font-weight: 590;
            color: #1c1c1e;
            margin-bottom: 0.5rem;
        }
        .example-text {
            font-size: 0.95rem;
            color: #6c6c70;
            margin-top: 0.5rem;
            border-top: 0.5px solid #e9e9ef;
            padding-top: 0.6rem;
        }
        .part-speech {
            display: inline-block;
            margin-top: 0.8rem;
            background: #e9e9ef;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .progress-section {
            margin: 0.8rem 0 1.2rem;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #6c6c70;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            background: #e9e9ef;
            border-radius: 30px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: #007aff;
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.2s;
        }
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1rem;
        }
        .nav-btn {
            background: #ffffff;
            border: 0.5px solid #d9d9df;
            padding: 0.6rem 1.4rem;
            border-radius: 2.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #007aff;
            cursor: pointer;
        }
        .nav-btn:active {
            transform: scale(0.96);
            background: #f2f2f6;
        }
        .nav-primary {
            background: #007aff;
            border: none;
            color: white;
        }
        .master-btn {
            background: #34c75920;
            border-color: #34c75960;
            color: #2c6e3c;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .modal-card {
            background: rgba(255,255,255,0.96);
            max-width: 95%;
            width: 900px;
            max-height: 85vh;
            border-radius: 2rem;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-card h3 {
            font-size: 1.6rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
        .word-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .word-table th, .word-table td {
            border-bottom: 0.5px solid #e5e5ea;
            padding: 0.7rem 0.3rem;
            text-align: left;
            vertical-align: top;
        }
        .action-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .small-btn {
            background: #f2f2f6;
            border: none;
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .add-form {
            background: #f9f9fb;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .form-row input, .form-row textarea {
            flex: 1;
            padding: 0.6rem;
            border-radius: 2rem;
            border: 0.5px solid #d9d9df;
            background: #ffffff;
            font-size: 0.85rem;
        }
        .audio-upload {
            background: #eef2ff;
            padding: 0.5rem;
            border-radius: 1rem;
        }
        .close-modal {
            background: #ff3b30;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            color: white;
        }
        @media (max-width: 550px) {
            .word-en { font-size: 2rem; }
            .meaning-cn { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="header">
        <h1>
            <!-- Logo 图片：请将 your-logo.png 替换为您自己的图片 URL -->
            <img class="logo-img" src=src="logo.png">
        </h1>
        <p>音频行业术语 · 每周新词库</p>
    </div>

    <div class="toolbar">
        <div class="search-box"><input type="text" id="searchInput" placeholder="搜索单词或中文..."></div>
        <div class="stats-badge" id="searchResultCount">📚 全部</div>
        <button class="btn-icon" id="openDictBtn">🔐 管理词库 (会员)</button>
        <button class="btn-icon" id="importJsonBtn">📂 导入词库 (会员)</button>
    </div>

    <div class="flashcard">
        <div class="word-en" id="currentWord">reverb</div>
        <div class="pronounce-bar">
            <button class="speak-btn" id="customAudioBtn">🎤 我的读音</button>
        </div>
        <div class="meaning-card">
            <div class="meaning-cn" id="currentMeaning">混响</div>
            <div class="example-text" id="currentExample">例: 增加空间深度感</div>
            <div class="part-speech" id="currentPos">名词</div>
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-label"><span>📊 学习进度</span><span id="masteryCount">0</span></div>
        <div class="progress-bar-bg"><div class="progress-fill" id="masteryFill"></div></div>
        <div class="progress-label"><span>📌 当前 <span id="currentPosIndex">1</span>/<span id="totalFiltered">0</span></span>
        <span id="masterStatusBadge" style="background:#e9e9ef; padding:0 10px; border-radius:30px;">未掌握</span></div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn">◀ 上一个</button>
        <button class="nav-btn nav-primary" id="nextBtn">下一个 ▶</button>
        <button class="nav-btn" id="randomBtn">🎲 随机</button>
        <button class="nav-btn master-btn" id="toggleMasterBtn">⭐ 标记掌握</button>
    </div>
    <div style="text-align:center; font-size:0.7rem; color:#8e8e93;">💡 支持自定义读音 · 学习进度自动保存</div>
</div>

<!-- 管理词库模态框 (需要会员码) -->
<div id="dictModal" class="modal">
    <div class="modal-card">
        <h3>📚 词库管理 <span class="close-modal" id="closeModalBtn">✖ 关闭</span></h3>
        <div style="margin-bottom:12px;"><button class="small-btn" id="exportJsonBtn">⬇️ 导出JSON</button></div>
        <div style="max-height: 50vh; overflow-y: auto;">
            <table class="word-table" id="wordTable"><thead><tr><th>单词</th><th>中文</th><th>有录音</th><th>操作</th></thead><tbody id="tableBody"></tbody>}</table>
        </div>
        <div class="add-form">
            <div class="form-row"><input type="text" id="newWord" placeholder="英文单词" style="flex:2"><input type="text" id="newMeaning" placeholder="中文释义" style="flex:2"></div>
            <div class="form-row"><input type="text" id="newExample" placeholder="例句"><input type="text" id="newPos" placeholder="词性"></div>
            <div class="form-row audio-upload">
                <span>🎤 标准读音录音：</span>
                <input type="file" id="audioUpload" accept="audio/*" style="flex:2">
                <button class="small-btn" id="recordAudioBtn" style="background:#ff9500;">🎙️ 录音</button>
                <audio id="audioPreview" controls style="height:40px; width:100%; margin-top:5px;"></audio>
            </div>
            <button class="small-btn" id="addWordBtn" style="background:#34c759; color:white;">➕ 添加/更新单词</button>
        </div>
        <div style="font-size:12px; color:#666; margin-top:8px;">※ 会员专属：可增删改单词、上传自定义读音。每周导入新词库即可解锁新单词。</div>
    </div>
</div>

<script>
    // ---------- 会员码 (您可自行修改) ----------
    const MEMBER_CODE = "heysync2025";  // 请修改为您自己的会员码

    // 是否已通过本次会话验证（简单实现：每次打开管理或导入时都要求输入，不保存会话，更安全）
    function verifyMemberCode(actionName) {
        let code = prompt(`【会员验证】\n您正在操作“${actionName}”，请输入会员码：`);
        if (code === MEMBER_CODE) {
            return true;
        } else {
            alert("会员码错误！无权限操作。");
            return false;
        }
    }

    // ---------- 默认词库 (支持录音Base64) ----------
    const DEFAULT_WORDS = [
        { id: "id1", word: "reverb", meaning: "混响 – 模拟空间反射", example: "增加空间深度感", pos: "名词", audioBase64: "" },
        { id: "id2", word: "discount", meaning: "折扣 – 音频设备促销", example: "限时折扣", pos: "名词", audioBase64: "" },
        { id: "id3", word: "frequency", meaning: "频率", example: "20Hz-20kHz", pos: "名词", audioBase64: "" },
        { id: "id4", word: "amplitude", meaning: "振幅", example: "决定音量", pos: "名词", audioBase64: "" },
        { id: "id5", word: "compressor", meaning: "压缩器", example: "动态处理", pos: "名词", audioBase64: "" }
    ];

    let words = [];
    let learnedMap = new Map();
    let filteredWords = [];
    let currentFilteredIndex = 0;
    let searchKeyword = "";
    let editingId = null;

    // 全局音频控制
    let currentAudioObj = null;

    function stopAllAudio() {
        if (currentAudioObj) {
            currentAudioObj.pause();
            currentAudioObj = null;
        }
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
        }
        const customBtn = document.getElementById('customAudioBtn');
        if (customBtn && customBtn.innerText.includes('停止')) {
            customBtn.innerHTML = '🎤 我的读音';
        }
    }

    // 播放自定义录音（支持停止/播放切换）
    function toggleCustomAudio() {
        if (filteredWords.length === 0) return;
        const word = filteredWords[currentFilteredIndex];
        if (!word.audioBase64 || word.audioBase64 === "") {
            alert("该单词尚未上传自定义读音，请在管理词库中上传录音");
            return;
        }
        if (currentAudioObj && !currentAudioObj.ended) {
            stopAllAudio();
            return;
        }
        stopAllAudio();
        const audio = new Audio(word.audioBase64);
        currentAudioObj = audio;
        const customBtn = document.getElementById('customAudioBtn');
        customBtn.innerHTML = '⏹️ 停止读音';
        audio.play().catch(e => {
            console.error("播放失败", e);
            stopAllAudio();
            customBtn.innerHTML = '🎤 我的读音';
        });
        audio.onended = () => {
            if (currentAudioObj === audio) {
                stopAllAudio();
                customBtn.innerHTML = '🎤 我的读音';
            }
        };
        audio.onerror = () => {
            stopAllAudio();
            customBtn.innerHTML = '🎤 我的读音';
            alert("音频文件损坏或格式不支持");
        };
    }

    function changeWordAndStopAudio(deltaOrRandom) {
        stopAllAudio();
        if (deltaOrRandom === 'random') {
            if (filteredWords.length) {
                let newIdx = Math.floor(Math.random() * filteredWords.length);
                if (filteredWords.length > 1 && newIdx === currentFilteredIndex) newIdx = (newIdx + 1) % filteredWords.length;
                currentFilteredIndex = newIdx;
            }
        } else if (deltaOrRandom === -1) {
            if (filteredWords.length) currentFilteredIndex = (currentFilteredIndex - 1 + filteredWords.length) % filteredWords.length;
        } else if (deltaOrRandom === 1) {
            if (filteredWords.length) currentFilteredIndex = (currentFilteredIndex + 1) % filteredWords.length;
        }
        updateUIafterFilter();
    }

    function persistData() {
        localStorage.setItem('heysync_words', JSON.stringify(words));
        const learnedObj = {};
        for (let [id, val] of learnedMap.entries()) learnedObj[id] = val;
        localStorage.setItem('heysync_learned', JSON.stringify(learnedObj));
    }

    function loadData() {
        const storedWords = localStorage.getItem('heysync_words');
        if (storedWords) {
            words = JSON.parse(storedWords);
            words.forEach(w => { if (w.audioBase64 === undefined) w.audioBase64 = ""; });
        } else {
            words = JSON.parse(JSON.stringify(DEFAULT_WORDS));
        }
        const storedLearned = localStorage.getItem('heysync_learned');
        learnedMap.clear();
        if (storedLearned) {
            const obj = JSON.parse(storedLearned);
            for (let [k,v] of Object.entries(obj)) learnedMap.set(k,v);
        } else {
            words.forEach(w => learnedMap.set(w.id, false));
        }
        words.forEach(w => { if (!learnedMap.has(w.id)) learnedMap.set(w.id, false); });
        applySearchAndRender();
    }

    function computeFiltered() {
        const kw = searchKeyword.trim().toLowerCase();
        if (kw === "") filteredWords = [...words];
        else filteredWords = words.filter(w => w.word.toLowerCase().includes(kw) || w.meaning.toLowerCase().includes(kw));
        if (filteredWords.length === 0) currentFilteredIndex = -1;
        else {
            if (currentFilteredIndex >= filteredWords.length) currentFilteredIndex = filteredWords.length-1;
            if (currentFilteredIndex < 0 && filteredWords.length) currentFilteredIndex = 0;
        }
        updateUIafterFilter();
    }

    function updateUIafterFilter() {
        totalFilteredSpan.innerText = filteredWords.length;
        if (filteredWords.length === 0) {
            currentWordSpan.innerText = "无匹配";
            currentMeaningSpan.innerText = "没有找到单词";
            currentExampleSpan.innerText = "请修改搜索";
            currentPosSpan.innerText = "";
            return;
        }
        const word = filteredWords[currentFilteredIndex];
        currentWordSpan.innerText = word.word;
        currentMeaningSpan.innerText = word.meaning;
        currentExampleSpan.innerText = word.example || "暂无例句";
        currentPosSpan.innerText = word.pos || "术语";
        currentPosIndexSpan.innerText = currentFilteredIndex+1;
        const isMastered = learnedMap.get(word.id) || false;
        masterStatusBadge.innerText = isMastered ? "✅ 已掌握" : "📘 未掌握";
        const totalMastered = words.filter(w => learnedMap.get(w.id)).length;
        masteryCountSpan.innerText = `${totalMastered}/${words.length}`;
        masteryFillDiv.style.width = `${(totalMastered/words.length)*100}%`;
        const customBtn = document.getElementById('customAudioBtn');
        if (customBtn) customBtn.innerHTML = '🎤 我的读音';
    }

    function onSearch(e) { searchKeyword = e.target.value; computeFiltered(); }
    function applySearchAndRender() { computeFiltered(); renderTableManager(); persistData(); }

    // 管理器渲染（仅当模态框打开时调用）
    function renderTableManager() {
        if(!wordTableBody) return;
        wordTableBody.innerHTML = '';
        words.forEach(w => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${escapeHtml(w.word)}</td>
                <td>${escapeHtml(w.meaning)}</td>
                <td>${w.audioBase64 ? '✅' : '❌'}</td>
                <td class="action-btns"><button class="small-btn edit-word" data-id="${w.id}">编辑</button>
                <button class="small-btn del-word" data-id="${w.id}" style="background:#ff3b30;color:white;">删除</button></td>
            `;
            wordTableBody.appendChild(tr);
        });
        document.querySelectorAll('.edit-word').forEach(btn => btn.addEventListener('click', (e) => { const id=btn.getAttribute('data-id'); editWordById(id); }));
        document.querySelectorAll('.del-word').forEach(btn => btn.addEventListener('click', (e) => { const id=btn.getAttribute('data-id'); deleteWordById(id); }));
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function editWordById(id) {
        const word = words.find(w => w.id === id);
        if(!word) return;
        editingId = id;
        newWordInput.value = word.word;
        newMeaningInput.value = word.meaning;
        newExampleInput.value = word.example || '';
        newPosInput.value = word.pos || '';
        if(word.audioBase64) { audioPreview.src = word.audioBase64; } else { audioPreview.src = ''; }
        audioUpload.value = '';
        recordedBlob = null;
    }

    function deleteWordById(id) {
        if(confirm("删除单词，掌握记录也会清除")){
            const idx = words.findIndex(w=>w.id===id);
            if(idx!==-1){ words.splice(idx,1); learnedMap.delete(id); applySearchAndRender(); renderTableManager(); persistData(); }
        }
    }

    // 录音相关
    let mediaRecorder = null;
    let audioChunks = [];
    let recordedBlob = null;

    async function startRecording() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("您的浏览器不支持录音功能。请使用 Chrome, Edge, Safari 等现代浏览器，并确保已授予麦克风权限。");
            return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = event => { audioChunks.push(event.data); };
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                recordedBlob = audioBlob;
                const url = URL.createObjectURL(audioBlob);
                audioPreview.src = url;
                audioPreview.controls = true;
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            alert("录音中... 点击“停止录音”结束");
            recordAudioBtn.innerText = "⏹️ 停止录音";
            recordAudioBtn.onclick = () => { if(mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); recordAudioBtn.innerText = "🎙️ 录音"; recordAudioBtn.onclick = startRecording; };
        } catch(err) {
            console.error(err);
            if (err.name === 'NotAllowedError') {
                alert("无法获取麦克风权限。请检查浏览器设置，允许访问麦克风后重试。\n（Chrome: 地址栏右侧🔒 → 网站设置 → 麦克风 → 允许）");
            } else {
                alert("录音失败: " + err.message);
            }
        }
    }

    async function addOrUpdateWord() {
        const wordEn = newWordInput.value.trim();
        const meaning = newMeaningInput.value.trim();
        if(!wordEn || !meaning) { alert("英文和中文不能为空"); return; }
        let audioBase64 = "";
        if(recordedBlob) {
            audioBase64 = await blobToBase64(recordedBlob);
        } else if(audioUpload.files && audioUpload.files[0]) {
            audioBase64 = await fileToBase64(audioUpload.files[0]);
        } else if(editingId) {
            const existing = words.find(w=>w.id===editingId);
            if(existing && existing.audioBase64) audioBase64 = existing.audioBase64;
        }
        const newId = editingId || (Date.now() + '-' + Math.random().toString(36));
        const newWord = {
            id: newId,
            word: wordEn,
            meaning: meaning,
            example: newExampleInput.value.trim() || "暂无例句",
            pos: newPosInput.value.trim() || "术语",
            audioBase64: audioBase64
        };
        if(editingId) {
            const index = words.findIndex(w=>w.id===editingId);
            if(index !== -1) words[index] = newWord;
            editingId = null;
        } else {
            words.push(newWord);
            learnedMap.set(newId, false);
        }
        newWordInput.value = ''; newMeaningInput.value = ''; newExampleInput.value = ''; newPosInput.value = '';
        audioUpload.value = ''; audioPreview.src = ''; recordedBlob = null;
        applySearchAndRender();
        renderTableManager();
        persistData();
        alert("保存成功");
    }

    function blobToBase64(blob) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    }
    function fileToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }

    function exportToJson() {
        const exportData = { words: words, learned: Object.fromEntries(learnedMap) };
        const dataStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `heysync_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importJson(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if(data.words && Array.isArray(data.words)) {
                    words = data.words;
                    if(data.learned) { learnedMap.clear(); for(let [k,v] of Object.entries(data.learned)) learnedMap.set(k,v); }
                    else words.forEach(w=>{ if(!learnedMap.has(w.id)) learnedMap.set(w.id,false); });
                    applySearchAndRender();
                    persistData();
                    alert("导入成功！新词库已生效。");
                } else throw new Error();
            } catch(err) { alert("JSON格式错误"); }
        };
        reader.readAsText(file);
    }

    // 受保护的打开管理词库
    function openDictProtected() {
        if (!verifyMemberCode("管理词库")) return;
        renderTableManager();
        dictModal.style.display = 'flex';
    }

    function importJsonProtected() {
        if (!verifyMemberCode("导入词库")) return;
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            if(e.target.files[0]) importJson(e.target.files[0]);
        };
        input.click();
    }

    function closeModal() { dictModal.style.display='none'; editingId=null; }

    // DOM 元素绑定
    const searchInput = document.getElementById('searchInput');
    const currentWordSpan = document.getElementById('currentWord');
    const currentMeaningSpan = document.getElementById('currentMeaning');
    const currentExampleSpan = document.getElementById('currentExample');
    const currentPosSpan = document.getElementById('currentPos');
    const customAudioBtn = document.getElementById('customAudioBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const randomBtn = document.getElementById('randomBtn');
    const toggleMasterBtn = document.getElementById('toggleMasterBtn');
    const masteryCountSpan = document.getElementById('masteryCount');
    const masteryFillDiv = document.getElementById('masteryFill');
    const currentPosIndexSpan = document.getElementById('currentPosIndex');
    const totalFilteredSpan = document.getElementById('totalFiltered');
    const masterStatusBadge = document.getElementById('masterStatusBadge');
    const openDictBtn = document.getElementById('openDictBtn');
    const importJsonBtn = document.getElementById('importJsonBtn');
    const dictModal = document.getElementById('dictModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const wordTableBody = document.getElementById('tableBody');
    const addWordBtn = document.getElementById('addWordBtn');
    const exportJsonBtn = document.getElementById('exportJsonBtn');
    const newWordInput = document.getElementById('newWord');
    const newMeaningInput = document.getElementById('newMeaning');
    const newExampleInput = document.getElementById('newExample');
    const newPosInput = document.getElementById('newPos');
    const audioUpload = document.getElementById('audioUpload');
    const audioPreview = document.getElementById('audioPreview');
    const recordAudioBtn = document.getElementById('recordAudioBtn');

    window.onload = () => {
        loadData();
        searchInput.addEventListener('input', onSearch);
        prevBtn.addEventListener('click', () => changeWordAndStopAudio(-1));
        nextBtn.addEventListener('click', () => changeWordAndStopAudio(1));
        randomBtn.addEventListener('click', () => changeWordAndStopAudio('random'));
        toggleMasterBtn.addEventListener('click', () => {
            if (filteredWords.length) {
                const w = filteredWords[currentFilteredIndex];
                learnedMap.set(w.id, !learnedMap.get(w.id));
                persistData();
                updateUIafterFilter();
                renderTableManager();
            }
        });
        customAudioBtn.addEventListener('click', toggleCustomAudio);
        openDictBtn.addEventListener('click', openDictProtected);
        importJsonBtn.addEventListener('click', importJsonProtected);
        closeModalBtn.addEventListener('click', closeModal);
        addWordBtn.addEventListener('click', addOrUpdateWord);
        exportJsonBtn.addEventListener('click', exportToJson);
        recordAudioBtn.addEventListener('click', startRecording);
        window.addEventListener('click', (e) => { if(e.target === dictModal) closeModal(); });
        audioUpload.addEventListener('change', async (e) => { if(e.target.files[0]) { const b64 = await fileToBase64(e.target.files[0]); audioPreview.src = b64; recordedBlob = null; } });
    };
</script>
