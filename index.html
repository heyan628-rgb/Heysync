<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Heysync · 音频工程师单词卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 苹果风格基础：柔和浅色背景，系统字体 */
        body {
            background: #f5f5f7;  /* 苹果浅灰背景 */
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            padding: 1.2rem;
            min-height: 100vh;
        }

        /* 主容器 */
        .app-wrapper {
            max-width: 880px;
            margin: 0 auto;
        }

        /* 头部 - 轻量磨砂感 */
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 0.5rem 0;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1c1c1e, #3a3a3e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .header h1:before {
            content: "🎧";
            font-size: 2rem;
            background: none;
            -webkit-background-clip: unset;
            color: #007aff;
        }
        .header p {
            color: #6c6c70;
            font-size: 0.85rem;
            margin-top: 0.3rem;
            font-weight: 400;
        }

        /* 工具栏 - 苹果风格毛玻璃卡片 */
        .toolbar {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 1.8rem;
            padding: 0.7rem 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.02);
            border: 0.5px solid rgba(255,255,255,0.5);
        }
        .search-box {
            flex: 2;
            min-width: 160px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.4rem;
            border-radius: 2.5rem;
            border: 0.5px solid #d9d9df;
            background: #ffffff;
            color: #1c1c1e;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .search-box input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            pointer-events: none;
            opacity: 0.7;
        }
        .stats-badge {
            background: #e9e9ef;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1c1c1e;
        }
        .btn-icon {
            background: #ffffff;
            border: 0.5px solid #d9d9df;
            color: #007aff;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .btn-icon:hover {
            background: #f2f2f6;
            transform: scale(0.97);
        }
        .btn-warning {
            background: #ffffff;
            color: #ff3b30;
            border-color: #ffd1cf;
        }
        .btn-warning:hover {
            background: #ffe6e5;
        }

        /* 单词卡片 —— 纯白圆润苹果风格 */
        .flashcard {
            background: #ffffff;
            border-radius: 2.2rem;
            padding: 2rem 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.02);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 0.5px solid rgba(0,0,0,0.03);
        }
        .word-en {
            font-size: 3rem;
            font-weight: 620;
            color: #1c1c1e;
            text-align: center;
            letter-spacing: -0.01em;
            word-break: break-word;
            margin-bottom: 0.5rem;
        }
        .pronounce-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 1.2rem;
        }
        .speak-btn {
            background: #f2f2f6;
            border: none;
            padding: 0.45rem 1.6rem;
            border-radius: 2.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s;
            color: #007aff;
            font-family: inherit;
        }
        .speak-btn:active {
            transform: scale(0.96);
            background: #e5e5ea;
        }
        .meaning-card {
            background: #f9f9fb;
            padding: 1.2rem;
            border-radius: 1.6rem;
            border-left: 4px solid #007aff;
        }
        .meaning-cn {
            font-size: 1.5rem;
            font-weight: 590;
            color: #1c1c1e;
            margin-bottom: 0.5rem;
        }
        .example-text {
            font-size: 0.95rem;
            color: #6c6c70;
            margin-top: 0.5rem;
            font-style: normal;
            border-top: 0.5px solid #e9e9ef;
            padding-top: 0.6rem;
        }
        .part-speech {
            display: inline-block;
            margin-top: 0.8rem;
            background: #e9e9ef;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #3a3a3e;
        }

        /* 进度区域 */
        .progress-section {
            margin: 0.8rem 0 1.2rem;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #6c6c70;
            margin-bottom: 6px;
            font-weight: 470;
        }
        .progress-bar-bg {
            background: #e9e9ef;
            border-radius: 30px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: #007aff;
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.2s;
        }

        /* 导航按钮组 — 苹果风格轻按钮 */
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1rem;
        }
        .nav-btn {
            background: #ffffff;
            border: 0.5px solid #d9d9df;
            padding: 0.6rem 1.4rem;
            border-radius: 2.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #007aff;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
        }
        .nav-btn:active {
            transform: scale(0.96);
            background: #f2f2f6;
        }
        .nav-primary {
            background: #007aff;
            border: none;
            color: white;
            box-shadow: 0 2px 6px rgba(0,122,255,0.2);
        }
        .nav-primary:active {
            background: #005fc1;
            transform: scale(0.96);
        }
        .master-btn {
            background: #34c75920;
            border-color: #34c75960;
            color: #2c6e3c;
        }
        .master-btn:active {
            background: #34c75940;
        }

        /* 模态框 苹果风格 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .modal-card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            max-width: 95%;
            width: 800px;
            max-height: 85vh;
            border-radius: 2rem;
            overflow-y: auto;
            padding: 1.5rem;
            color: #1c1c1e;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 0.5px solid rgba(255,255,255,0.5);
        }
        .modal-card h3 {
            font-size: 1.6rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            font-weight: 590;
        }
        .word-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .word-table th, .word-table td {
            border-bottom: 0.5px solid #e5e5ea;
            padding: 0.7rem 0.3rem;
            text-align: left;
            vertical-align: top;
        }
        .word-table th {
            color: #007aff;
            font-weight: 600;
        }
        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .small-btn {
            background: #f2f2f6;
            border: none;
            color: #007aff;
            border-radius: 2rem;
            padding: 0.3rem 0.9rem;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .add-form {
            background: #f9f9fb;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .add-form input {
            flex: 1;
            padding: 0.6rem;
            border-radius: 2rem;
            border: 0.5px solid #d9d9df;
            background: #ffffff;
        }
        .close-modal {
            background: #ff3b30;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            color: white;
            font-size: 0.8rem;
        }
        .import-export {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
        }
        @media (max-width: 550px) {
            .word-en { font-size: 2rem; }
            .meaning-cn { font-size: 1.2rem; }
            .flashcard { padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="header">
        <h1>Heysync</h1>
        <p>音频行业术语 · 智能词库 · 每周更新 | 中英搜索 | 掌握进度跟踪</p>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索单词或中文...">
        </div>
        <div class="stats-badge" id="searchResultCount">📚 全部</div>
        <button class="btn-icon" id="openDictBtn">📖 管理词库</button>
        <button class="btn-icon btn-warning" id="importJsonBtn">📂 导入JSON</button>
    </div>

    <!-- 主卡片 -->
    <div class="flashcard" id="flashcard">
        <div class="word-en" id="currentWord">Frequency</div>
        <div class="pronounce-bar">
            <button class="speak-btn" id="speakButton">🔊 发音 (美式)</button>
        </div>
        <div class="meaning-card">
            <div class="meaning-cn" id="currentMeaning">频率 (Hz)</div>
            <div class="example-text" id="currentExample">例: 人耳可听范围 20Hz - 20kHz</div>
            <div class="part-speech" id="currentPos">名词 · 声学</div>
        </div>
    </div>

    <!-- 进度 & 掌握 -->
    <div class="progress-section">
        <div class="progress-label">
            <span>📊 学习进度 (掌握单词)</span>
            <span id="masteryCount">0</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-fill" id="masteryFill"></div></div>
        <div class="progress-label" style="margin-top: 8px;">
            <span>📌 当前单词: <span id="currentPosIndex">1</span> / <span id="totalFiltered">0</span> (过滤后)</span>
            <span id="masterStatusBadge" style="background:#e9e9ef; padding:0 10px; border-radius:30px; font-size:0.75rem;">未掌握</span>
        </div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn">◀ 上一个</button>
        <button class="nav-btn nav-primary" id="nextBtn">下一个 ▶</button>
        <button class="nav-btn" id="randomBtn">🎲 随机</button>
        <button class="nav-btn master-btn" id="toggleMasterBtn">⭐ 标记掌握 / 取消</button>
    </div>
    <div style="text-align:center; font-size:0.7rem; color:#8e8e93; margin-top:0.5rem;">
        💡 提示：搜索框实时过滤 | 管理词库支持增删改查，导出/导入JSON实现每周批量更新
    </div>
</div>

<!-- 模态框：词库管理器 -->
<div id="dictModal" class="modal">
    <div class="modal-card">
        <h3>📚 音频专业词库管理器 <span class="close-modal" id="closeModalBtn">✖ 关闭</span></h3>
        <div class="import-export">
            <button class="small-btn" id="exportJsonBtn" style="background:#007aff; color:white;">⬇️ 导出词库 (JSON)</button>
            <label class="small-btn" style="background:#6c6c70; color:white; cursor:pointer;">📁 导入并替换词库
                <input type="file" id="importFileInput" accept=".json" style="display:none;">
            </label>
        </div>
        <div style="max-height: 55vh; overflow-y: auto;">
            <table class="word-table" id="wordTable">
                <thead>
                    <tr><th>单词</th><th>中文释义</th><th>例句(简)</th><th>词性</th><th>操作</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="add-form">
            <input type="text" id="newWord" placeholder="英文单词" autocomplete="off">
            <input type="text" id="newMeaning" placeholder="中文释义">
            <input type="text" id="newExample" placeholder="例句 (可选)">
            <input type="text" id="newPos" placeholder="词性/标签">
            <button class="small-btn" id="addWordBtn" style="background:#34c759; color:white;">➕ 添加单词</button>
        </div>
        <div style="margin-top: 12px; font-size:12px; color:#8e8e93;">※ 每周更新：直接编辑/添加，或导出后修改再导入，立即生效并保留掌握状态（基于ID）</div>
    </div>
</div>

<script>
    // ---------- 默认音频行业词库 (含ID，便于掌握状态跟踪) ----------
    const DEFAULT_WORDS = [
        { id: "id1", word: "Frequency", meaning: "频率 (Hz) – 声波每秒振动次数", example: "人耳可听范围 20Hz - 20kHz", pos: "名词 · 物理声学" },
        { id: "id2", word: "Amplitude", meaning: "振幅 – 声音压力变化幅度，决定音量", example: "增大振幅提升响度", pos: "名词 · 动态" },
        { id: "id3", word: "Sample Rate", meaning: "采样率 (kHz) – 每秒采样次数", example: "专业录音常用48kHz或96kHz", pos: "名词 · 数字音频" },
        { id: "id4", word: "Bit Depth", meaning: "位深度 – 量化精度", example: "24-bit 比16-bit动态范围更大", pos: "名词 · 精度" },
        { id: "id5", word: "Compressor", meaning: "压缩器 – 控制动态范围", example: "让人声更贴耳", pos: "名词 · 动态处理" },
        { id: "id6", word: "Equalizer (EQ)", meaning: "均衡器 – 调整频段增益", example: "去除低频嗡嗡声", pos: "名词 · 频率塑形" },
        { id: "id7", word: "Reverb", meaning: "混响 – 模拟空间反射", example: "增加空间深度感", pos: "名词 · 空间效果" },
        { id: "id8", word: "Delay", meaning: "延迟/回声 – 时间偏移效果", example: "吉他节奏延迟", pos: "名词 · 时间效果" },
        { id: "id9", word: "Limiter", meaning: "限制器 – 防止过载", example: "母带最后一级限幅", pos: "名词 · 动态" },
        { id: "id10", word: "Gain Staging", meaning: "增益分级 – 电平管理", example: "避免失真和底噪", pos: "术语 · 信号链" },
        { id: "id11", word: "Clipping", meaning: "削波 – 信号过载失真", example: "输入过载产生削波", pos: "名词 · 失真" },
        { id: "id12", word: "Phantom Power", meaning: "幻象供电 (+48V)", example: "电容麦克风需要幻象电源", pos: "名词 · 设备" },
        { id: "id13", word: "Transient", meaning: "瞬态 – 声音起始爆发", example: "鼓击的瞬态强烈", pos: "名词 · 声学" },
        { id: "id14", word: "Noise Floor", meaning: "本底噪声 – 底噪水平", example: "高信噪比意味着低底噪", pos: "名词 · 噪声" },
        { id: "id15", word: "Stereo Imaging", meaning: "立体声成像 – 声场定位", example: "扩展立体声宽度", pos: "名词 · 空间" },
        { id: "id16", word: "Phase Cancellation", meaning: "相位抵消 – 反相声波抵消", example: "多麦克风录音注意相位", pos: "名词 · 物理" },
        { id: "id17", word: "Headroom", meaning: "动态余量 – 安全电平空间", example: "保留6dB避免削波", pos: "名词 · 电平" },
        { id: "id18", word: "Wavelength", meaning: "波长 – 声波周期长度", example: "低频波长较长", pos: "名词 · 波动" },
        { id: "id19", word: "Harmonic Distortion", meaning: "谐波失真 – 音染", example: "电子管偶次谐波", pos: "名词 · 音质" },
        { id: "id20", word: "Latency", meaning: "延迟 (ms) – 信号延迟", example: "低延迟监听至关重要", pos: "名词 · 实时" }
    ];

    // ---------- 全局状态 ----------
    let words = [];            // 存储当前词库对象数组 {id, word, meaning, example, pos}
    let learnedMap = new Map(); // key: word.id, value: boolean (true掌握)
    let filteredWords = [];    // 经过搜索过滤后的单词列表
    let currentFilteredIndex = 0;  // 当前在filteredWords中的索引
    let searchKeyword = "";

    // DOM 元素
    const searchInput = document.getElementById('searchInput');
    const searchResultCount = document.getElementById('searchResultCount');
    const currentWordSpan = document.getElementById('currentWord');
    const currentMeaningSpan = document.getElementById('currentMeaning');
    const currentExampleSpan = document.getElementById('currentExample');
    const currentPosSpan = document.getElementById('currentPos');
    const speakBtn = document.getElementById('speakButton');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const randomBtn = document.getElementById('randomBtn');
    const toggleMasterBtn = document.getElementById('toggleMasterBtn');
    const masteryCountSpan = document.getElementById('masteryCount');
    const masteryFillDiv = document.getElementById('masteryFill');
    const currentPosIndexSpan = document.getElementById('currentPosIndex');
    const totalFilteredSpan = document.getElementById('totalFiltered');
    const masterStatusBadge = document.getElementById('masterStatusBadge');
    const openDictBtn = document.getElementById('openDictBtn');
    const dictModal = document.getElementById('dictModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const wordTableBody = document.getElementById('tableBody');
    const addWordBtn = document.getElementById('addWordBtn');
    const exportJsonBtn = document.getElementById('exportJsonBtn');
    const importFileInput = document.getElementById('importFileInput');
    const importJsonBtn = document.getElementById('importJsonBtn');

    // 辅助函数: 保存词库 & 掌握状态到 localStorage
    function persistData() {
        localStorage.setItem('audioVocab_words', JSON.stringify(words));
        const learnedObj = {};
        for (let [id, val] of learnedMap.entries()) learnedObj[id] = val;
        localStorage.setItem('audioVocab_learned', JSON.stringify(learnedObj));
    }

    // 加载数据 & 初始化
    function loadData() {
        const storedWords = localStorage.getItem('audioVocab_words');
        if (storedWords) {
            words = JSON.parse(storedWords);
        } else {
            words = JSON.parse(JSON.stringify(DEFAULT_WORDS));
        }
        const storedLearned = localStorage.getItem('audioVocab_learned');
        learnedMap.clear();
        if (storedLearned) {
            const obj = JSON.parse(storedLearned);
            for (let [k, v] of Object.entries(obj)) learnedMap.set(k, v);
        } else {
            words.forEach(w => learnedMap.set(w.id, false));
        }
        words.forEach(w => { if (!learnedMap.has(w.id)) learnedMap.set(w.id, false); });
        applySearchAndRender();
    }

    // 重新计算filteredWords
    function computeFiltered() {
        const kw = searchKeyword.trim().toLowerCase();
        if (kw === "") {
            filteredWords = [...words];
        } else {
            filteredWords = words.filter(item => 
                item.word.toLowerCase().includes(kw) || 
                item.meaning.toLowerCase().includes(kw)
            );
        }
        if (filteredWords.length === 0) {
            currentFilteredIndex = -1;
        } else {
            if (currentFilteredIndex >= filteredWords.length) currentFilteredIndex = filteredWords.length - 1;
            if (currentFilteredIndex < 0 && filteredWords.length > 0) currentFilteredIndex = 0;
        }
        if (filteredWords.length === 0) currentFilteredIndex = -1;
        updateUIafterFilter();
    }

    function updateUIafterFilter() {
        totalFilteredSpan.innerText = filteredWords.length;
        if (filteredWords.length === 0) {
            currentWordSpan.innerText = "无匹配";
            currentMeaningSpan.innerText = "没有找到相关单词";
            currentExampleSpan.innerText = "请修改搜索词或添加新词";
            currentPosSpan.innerText = "---";
            currentPosIndexSpan.innerText = "0";
            masterStatusBadge.innerText = "无数据";
            return;
        }
        const currentWordObj = filteredWords[currentFilteredIndex];
        if (currentWordObj) {
            currentWordSpan.innerText = currentWordObj.word;
            currentMeaningSpan.innerText = currentWordObj.meaning;
            currentExampleSpan.innerText = currentWordObj.example;
            currentPosSpan.innerText = currentWordObj.pos;
            currentPosIndexSpan.innerText = currentFilteredIndex + 1;
            const isMastered = learnedMap.get(currentWordObj.id) || false;
            masterStatusBadge.innerText = isMastered ? "✅ 已掌握" : "📘 未掌握";
            masterStatusBadge.style.background = isMastered ? "#34c75920" : "#e9e9ef";
        }
        const totalWords = words.length;
        let masteredTotal = 0;
        for (let w of words) {
            if (learnedMap.get(w.id)) masteredTotal++;
        }
        masteryCountSpan.innerText = `${masteredTotal}/${totalWords}`;
        const percent = totalWords === 0 ? 0 : (masteredTotal / totalWords) * 100;
        masteryFillDiv.style.width = `${percent}%`;
        if (searchKeyword) searchResultCount.innerText = `🔍 找到 ${filteredWords.length} 条`;
        else searchResultCount.innerText = `📚 共 ${words.length} 词`;
    }

    function onSearch(e) {
        searchKeyword = e.target.value;
        computeFiltered();
    }

    function applySearchAndRender() {
        computeFiltered();
        renderTableManager();
        persistData();
    }

    function toggleMasterCurrent() {
        if (filteredWords.length === 0) return;
        const cur = filteredWords[currentFilteredIndex];
        if (!cur) return;
        const newVal = !learnedMap.get(cur.id);
        learnedMap.set(cur.id, newVal);
        persistData();
        updateUIafterFilter();
        renderTableManager();
    }

    function goPrev() {
        if (filteredWords.length === 0) return;
        currentFilteredIndex = (currentFilteredIndex - 1 + filteredWords.length) % filteredWords.length;
        updateUIafterFilter();
    }
    function goNext() {
        if (filteredWords.length === 0) return;
        currentFilteredIndex = (currentFilteredIndex + 1) % filteredWords.length;
        updateUIafterFilter();
    }
    function randomWord() {
        if (filteredWords.length === 0) return;
        let newIdx = Math.floor(Math.random() * filteredWords.length);
        if (filteredWords.length > 1 && newIdx === currentFilteredIndex) newIdx = (newIdx+1)%filteredWords.length;
        currentFilteredIndex = newIdx;
        updateUIafterFilter();
    }

    function speakCurrent() {
        if (filteredWords.length === 0) return;
        const wordText = filteredWords[currentFilteredIndex].word;
        if (!window.speechSynthesis) { alert("浏览器不支持语音"); return; }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(wordText);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }

    // 词库管理器表格渲染
    function renderTableManager() {
        if (!wordTableBody) return;
        wordTableBody.innerHTML = '';
        words.forEach((item) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="max-width:130px;">${escapeHtml(item.word)}</td>
                <td style="max-width:150px;">${escapeHtml(item.meaning)}</td>
                <td style="max-width:180px;">${escapeHtml(item.example)}</td>
                <td>${escapeHtml(item.pos)}</td>
                <td class="action-btns">
                    <button class="small-btn edit-word" data-id="${item.id}">✏️编辑</button>
                    <button class="small-btn del-word" data-id="${item.id}" style="background:#ff3b30; color:white;">删除</button>
                </td>
            `;
            wordTableBody.appendChild(tr);
        });
        document.querySelectorAll('.edit-word').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                editWordById(id);
            });
        });
        document.querySelectorAll('.del-word').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                deleteWordById(id);
            });
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function editWordById(id) {
        const wordObj = words.find(w => w.id === id);
        if (!wordObj) return;
        const newWord = prompt("编辑英文单词", wordObj.word);
        if (newWord === null) return;
        const newMeaning = prompt("中文释义", wordObj.meaning);
        if (newMeaning === null) return;
        const newExample = prompt("例句", wordObj.example) || "";
        const newPos = prompt("词性/标签", wordObj.pos);
        if (newPos === null) return;
        wordObj.word = newWord.trim();
        wordObj.meaning = newMeaning.trim();
        wordObj.example = newExample.trim();
        wordObj.pos = newPos.trim();
        applySearchAndRender();
    }

    function deleteWordById(id) {
        if (confirm("确定删除该单词吗？会影响已掌握记录。")) {
            const idx = words.findIndex(w => w.id === id);
            if (idx !== -1) {
                words.splice(idx, 1);
                learnedMap.delete(id);
                applySearchAndRender();
            }
        }
    }

    function addNewWord() {
        const newWordVal = document.getElementById('newWord').value.trim();
        const newMeaningVal = document.getElementById('newMeaning').value.trim();
        const newExampleVal = document.getElementById('newExample').value.trim();
        const newPosVal = document.getElementById('newPos').value.trim();
        if (!newWordVal || !newMeaningVal) { alert("请至少填写英文和中文释义"); return; }
        const newId = Date.now() + '-' + Math.random().toString(36);
        const newItem = {
            id: newId,
            word: newWordVal,
            meaning: newMeaningVal,
            example: newExampleVal || "暂无例句",
            pos: newPosVal || "术语"
        };
        words.push(newItem);
        learnedMap.set(newId, false);
        document.getElementById('newWord').value = '';
        document.getElementById('newMeaning').value = '';
        document.getElementById('newExample').value = '';
        document.getElementById('newPos').value = '';
        applySearchAndRender();
    }

    function exportToJson() {
        const exportData = { words: words, learned: Object.fromEntries(learnedMap) };
        const dataStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `heysync_vocab_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importJson(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.words && Array.isArray(data.words)) {
                    words = data.words;
                    if (data.learned) {
                        learnedMap.clear();
                        for (let [k,v] of Object.entries(data.learned)) learnedMap.set(k,v);
                    } else {
                        words.forEach(w => { if(!learnedMap.has(w.id)) learnedMap.set(w.id, false); });
                    }
                    applySearchAndRender();
                    alert("导入成功！词库已更新");
                } else throw new Error("格式错误");
            } catch(err) { alert("JSON文件格式无效，需要包含words数组"); }
        };
        reader.readAsText(file);
    }

    function openModal() { dictModal.style.display = 'flex'; renderTableManager(); }
    function closeModal() { dictModal.style.display = 'none'; }

    // 事件绑定
    window.onload = () => {
        loadData();
        searchInput.addEventListener('input', onSearch);
        prevBtn.addEventListener('click', goPrev);
        nextBtn.addEventListener('click', goNext);
        randomBtn.addEventListener('click', randomWord);
        toggleMasterBtn.addEventListener('click', toggleMasterCurrent);
        speakBtn.addEventListener('click', speakCurrent);
        openDictBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        addWordBtn.addEventListener('click', addNewWord);
        exportJsonBtn.addEventListener('click', exportToJson);
        importJsonBtn.addEventListener('click', () => importFileInput.click());
        importFileInput.addEventListener('change', (e) => { if(e.target.files[0]) importJson(e.target.files[0]); e.target.value=''; });
        window.addEventListener('click', (e) => { if(e.target === dictModal) closeModal(); });
    };
</script>
</body>
</html>
